name: Build and Deploy
on: [push]
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build
        env:
          # The Gemini API key is NOT here — it lives in Vercel's secure vault.
          # This is the public URL of your Vercel API project.
          # Set VITE_API_URL in GitHub Secrets → e.g. https://pm-api.vercel.app/api/generate
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
